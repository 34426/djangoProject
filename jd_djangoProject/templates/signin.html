<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--favicon-->
    <link rel="icon" href="/static/assets/images/favicon-32x32.png" type="image/png"/>
    <!--plugins-->
    <link href="/static/assets/plugins/simplebar/css/simplebar.css" rel="stylesheet"/>
    <link href="/static/assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet"/>
    <link href="/static/assets/plugins/metismenu/css/metisMenu.min.css" rel="stylesheet"/>
    <!-- loader-->
    <link href="/static/assets/css/pace.min.css" rel="stylesheet"/>
    <script src="/static/assets/js/pace.min.js"></script>
    <!-- Bootstrap CSS -->
    <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="/static/assets/css/app.css" rel="stylesheet">
    <link href="/static/assets/css/icons.css" rel="stylesheet">
    <title>京东商品数据分析可视化系统</title>

    <style>
        .bg-login {
            /* 替换为你的背景图路径！！！ */
            background-image: url("/static/assets/images/login-images/bg-login-img.jpg");
            background-size: cover; /* 背景铺满屏幕 */
            background-position: center; /* 背景居中 */
            background-repeat: no-repeat; /* 背景不重复 */
            background-attachment: fixed; /* 滚动时背景固定 */
            min-height: 100vh; /* 占满整个屏幕高度 */
            border-radius: 13px;
        }

    </style>
</head>

<body class="bg-login">
<!--wrapper-->
<div class="wrapper">
    <header class="login-header shadow">

    </header>
    <div class="section-authentication-signin d-flex align-items-center justify-content-center my-5 my-lg-4">

         <p class="toptext">商城手机销售数据分析系统</p>
        <div class="container-fluid">
            <div class="row row-cols-1 row-cols-lg-2 row-cols-xl-3">
                <div class="col mx-auto">
                    <div class="card mt-5 mt-lg-0">
                        <div class="card-body">
                                <div class="text-center">
                                    <h3 class="">登录</h3>
                                    <p> <a href="{% url 'register' %}"></a>
                                    </p>
                                </div>
                                <div class="form-body">
                                    <form class="row g-3" method="POST">
                                        <div class="col-12">
                                            <label for="inputEmailAddress" class="form-label">账号</label>
                                            <input name="username" class="form-control" id="inputEmailAddress"
                                                   placeholder="输入账号">
                                        </div>
                                        <div class="col-12">
                                            <label for="inputChoosePassword" class="form-label">密码</label>
                                            <div class="input-group" id="show_hide_password">
                                                <input name="password" type="password" class="form-control border-end-0"
                                                       id="inputChoosePassword" value="12345678"
                                                       placeholder="Enter Password"> <a href="javascript:;"
                                                                                        class="input-group-text bg-transparent">
                                                <i class='bx bx-hide'></i></a>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox"
                                                       id="flexSwitchCheckChecked" checked>
                                                <label class="form-check-label"
                                                       for="flexSwitchCheckChecked">记住密码</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6 text-end"><a href=""></a>
                                        </div>
                                        <div class="col-12">
                                            <div class="d-grid">
                                                <button type="submit" class="btn btn-primary"><i
                                                        class="bx bxs-lock-open"></i>立即登录
                                                </button>
                                            </div>
                                        </div>
                                        {% csrf_token %}
                                    </form>
                                </div>
                        </div>
                    </div>
                </div>

            </div>
            <!--end row-->
            <p class="mb-007">Copyright © xxxx. All right reserved.</p>
        </div>
    </div>

</div>
<!--end wrapper-->
<!-- Bootstrap JS -->
<script src="/static/assets/js/bootstrap.bundle.min.js"></script>
<!--plugins-->
<script src="/static/assets/js/jquery.min.js"></script>
<script src="/static/assets/plugins/simplebar/js/simplebar.min.js"></script>
<script src="/static/assets/plugins/metismenu/js/metisMenu.min.js"></script>
<script src="/static/assets/plugins/perfect-scrollbar/js/perfect-scrollbar.js"></script>
<!--Password show & hide js -->
<script>
    $(document).ready(function () {
        $("#show_hide_password a").on('click', function (event) {
            event.preventDefault();
            if ($('#show_hide_password input').attr("type") == "text") {
                $('#show_hide_password input').attr('type', 'password');
                $('#show_hide_password i').addClass("bx-hide");
                $('#show_hide_password i').removeClass("bx-show");
            } else if ($('#show_hide_password input').attr("type") == "password") {
                $('#show_hide_password input').attr('type', 'text');
                $('#show_hide_password i').removeClass("bx-hide");
                $('#show_hide_password i').addClass("bx-show");
            }
        });
    });
</script>
<!--app JS-->
<script src="/static/assets/js/app.js"></script>
</body>

</html>
